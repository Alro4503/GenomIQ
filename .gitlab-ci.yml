build-backend:
  image: docker:27.2.0
  services:
    - docker:27.2.0-dind
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - cd backend
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:latest

build-frontend:
  image: docker:27.2.0
  services:
    - docker:27.2.0-dind
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - cd frontend
    - docker build --build-arg NEXT_PUBLIC_API_URL=https://genomiq.cat/api -t $CI_REGISTRY_IMAGE/frontend:latest .
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

build-proxy:
  image: docker:27.2.0
  services:
    - docker:27.2.0-dind
  script:
    - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
    - cd proxy
    - docker build -t $CI_REGISTRY_IMAGE/proxy:latest .
    - docker push $CI_REGISTRY_IMAGE/proxy:latest